<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EduSustain AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4 animate-fade-in">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="fa-solid fa-graduation-cap me-2 text-gradient"></i>EduSustain AI</h2>
                    <p class="text-muted">Admin Dashboard Access</p>
                </div>

                <div class="glass-card p-4 p-md-5">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} bg-danger text-white border-0 py-2 mb-4" role="alert">
                              <i class="fa-solid fa-circle-exclamation me-2"></i>{{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form action="/login" method="POST">
                        <div class="mb-4">
                            <label class="form-label"><i class="fa-solid fa-user-shield me-2"></i>Username</label>
                            <input type="text" class="form-control" name="username" placeholder="Enter admin username" required autofocus>
                        </div>
                        
                        <div class="mb-5">
                            <label class="form-label"><i class="fa-solid fa-lock me-2"></i>Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Secure Login
                            </button>
                            <a href="/" class="btn btn-outline-custom mt-2">
                                <i class="fa-solid fa-house me-2"></i>Return Home
                            </a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='chatbot.js') }}"></script>
</body>
</html>
