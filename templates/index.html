<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dropout Prediction System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-graduation-cap me-2 text-gradient"></i>EduSustain AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="fa-solid fa-user-plus me-1"></i>New Prediction</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="fa-solid fa-chart-pie me-1"></i>Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 animate-fade-in">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold mb-3">Student <span class="text-gradient">Risk Analysis</span></h1>
                    <p class="text-light opacity-75 fs-5">Enter student details below to predict dropout risk and receive AI-based counseling recommendations.</p>
                </div>

                <div class="glass-card">
                    <form action="/predict" method="POST">
                        
                        <div class="row mb-4">
                            <div class="col-md-4">
                                <label class="form-label"><i class="fa-regular fa-id-card me-2"></i>Student Name</label>
                                <input type="text" class="form-control" name="student_name" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-4 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-solid fa-hashtag me-2"></i>Roll Number</label>
                                <input type="text" class="form-control" name="roll_number" placeholder="e.g. CS101" required>
                            </div>
                            <div class="col-md-4 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-solid fa-building-columns me-2"></i>Department / Class</label>
                                <select class="form-select" name="department" required>
                                    <option value="" disabled selected>Select department...</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Mechanical">Mechanical</option>
                                    <option value="Civil">Civil</option>
                                    <option value="Electrical">Electrical</option>
                                    <option value="Information Technology">Information Technology</option>
                                    <option value="Business Admin">Business Admin</option>
                                    <option value="Arts & Science">Arts & Science</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label"><i class="fa-solid fa-calendar-check me-2"></i>Attendance (%)</label>
                                <input type="number" step="0.1" class="form-control" name="attendance" min="0" max="100" placeholder="e.g. 75" required>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-solid fa-file-pen me-2"></i>Average Marks (%)</label>
                                <input type="number" step="0.1" class="form-control" name="marks" min="0" max="100" placeholder="e.g. 68.5" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label"><i class="fa-solid fa-book-journal-whills me-2"></i>Current Arrears</label>
                                <input type="number" class="form-control" name="arrears" min="0" value="0" required>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-solid fa-list-check me-2"></i>Assignments Submitted</label>
                                <input type="number" class="form-control" name="assignments" min="0" max="10" placeholder="Out of 10" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label"><i class="fa-solid fa-indian-rupee-sign me-2"></i>Family Income Bracket</label>
                                <select class="form-select" name="family_income" required>
                                    <option value="" disabled selected>Select bracket...</option>
                                    <option value="1">Low Income</option>
                                    <option value="2">Medium Income</option>
                                    <option value="3">High Income</option>
                                </select>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-solid fa-bus me-2"></i>Travel Distance (km)</label>
                                <input type="number" step="0.1" class="form-control" name="travel_distance" min="0" placeholder="e.g. 15" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label"><i class="fa-solid fa-brain me-2"></i>Stress Level (1-10)</label>
                                <input type="number" class="form-control" name="stress_level" min="1" max="10" placeholder="1 = Low, 10 = High" required>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label"><i class="fa-regular fa-comment-dots me-2"></i>Recent Feedback Sentiment</label>
                                <select class="form-select" name="feedback_sentiment" required>
                                    <option value="" disabled selected>Select sentiment...</option>
                                    <option value="1">Positive</option>
                                    <option value="0">Neutral</option>
                                    <option value="-1">Negative</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary-custom btn-lg">
                                <i class="fa-solid fa-wand-magic-sparkles me-2"></i>Generate AI Analysis
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='chatbot.js') }}"></script>
</body>
</html>
